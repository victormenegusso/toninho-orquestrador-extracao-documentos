{% extends "layouts/dashboard.html" %}

{% block title %}{% if volume %}Editar Volume{% else %}Novo Volume{% endif %}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6"
     x-data="volumeForm()"
     x-init="init()">
    <div class="flex items-center space-x-4">
        <a href="/volumes" class="text-gray-500 hover:text-gray-700">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-gray-900" x-text="isEdit ? 'Editar Volume' : 'Novo Volume'"></h1>
    </div>

    <!-- Global Error -->
    <div x-show="globalError" x-cloak class="bg-red-50 border border-red-200 rounded-lg p-4">
        <p class="text-sm text-red-600" x-text="globalError"></p>
    </div>

    <!-- Success -->
    <div x-show="successMsg" x-cloak class="bg-green-50 border border-green-200 rounded-lg p-4">
        <p class="text-sm text-green-600" x-text="successMsg"></p>
    </div>

    <!-- Form -->
    <form @submit.prevent="save()" class="bg-white rounded-lg shadow-md p-6 space-y-5">
        <div>
            <label for="nome" class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
            <input id="nome" type="text" x-model="form.nome"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Ex: Saída Principal">
            <p x-show="errors.nome" x-text="errors.nome" class="text-sm text-red-600 mt-1"></p>
        </div>

        <div>
            <label for="path" class="block text-sm font-medium text-gray-700 mb-1">Caminho do diretório</label>
            <div class="flex space-x-2">
                <input id="path" type="text" x-model="form.path"
                       class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="./output ou /app/output">
                <button type="button" @click="validatePath()"
                        class="px-3 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 text-sm"
                        :disabled="!form.path || validating">
                    <span x-show="!validating">Validar</span>
                    <span x-show="validating">...</span>
                </button>
            </div>
            <p x-show="errors.path" x-text="errors.path" class="text-sm text-red-600 mt-1"></p>
            <!-- Validation result -->
            <div x-show="pathValidation" x-cloak class="mt-2 text-sm rounded-md p-3"
                 :class="pathValidation && pathValidation.valido ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'">
                <template x-if="pathValidation && pathValidation.valido">
                    <span>✓ Caminho válido — leitura e escrita OK</span>
                </template>
                <template x-if="pathValidation && !pathValidation.valido">
                    <span x-text="'✗ ' + (pathValidation.erro || 'Caminho inválido')"></span>
                </template>
            </div>
        </div>

        <div>
            <label for="descricao" class="block text-sm font-medium text-gray-700 mb-1">Descrição (opcional)</label>
            <textarea id="descricao" x-model="form.descricao" rows="2"
                      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      placeholder="Descrição do volume"></textarea>
        </div>

        <template x-if="isEdit">
            <div>
                <label for="status" class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                <select id="status" x-model="form.status"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="ativo">Ativo</option>
                    <option value="inativo">Inativo</option>
                </select>
            </div>
        </template>

        <div class="flex justify-end space-x-3 pt-4 border-t">
            <a href="/volumes" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Cancelar</a>
            <button type="submit"
                    class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50"
                    :disabled="isSubmitting">
                <span x-show="!isSubmitting" x-text="isEdit ? 'Salvar' : 'Criar Volume'"></span>
                <span x-show="isSubmitting">Salvando...</span>
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
function volumeForm() {
    const volumeData = {{ volume|tojson if volume else 'null' }};
    return {
        isEdit: !!volumeData,
        volumeId: volumeData ? volumeData.id : null,
        isSubmitting: false,
        validating: false,
        globalError: '',
        successMsg: '',
        errors: {},
        pathValidation: null,
        form: {
            nome: volumeData ? volumeData.nome : '',
            path: volumeData ? volumeData.path : '',
            descricao: volumeData ? (volumeData.descricao || '') : '',
            status: volumeData ? volumeData.status : 'ativo',
        },

        init() {},

        async validatePath() {
            if (!this.form.path) return;
            this.validating = true;
            this.pathValidation = null;
            try {
                const response = await fetch('/api/v1/volumes/validar-path', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: this.form.path }),
                });
                const payload = await response.json();
                this.pathValidation = payload.data || payload;
            } catch (e) {
                this.pathValidation = { valido: false, erro: 'Erro ao validar caminho' };
            }
            this.validating = false;
        },

        validate() {
            this.errors = {};
            if (!this.form.nome || !this.form.nome.trim()) {
                this.errors.nome = 'Nome é obrigatório.';
            }
            if (!this.form.path || !this.form.path.trim()) {
                this.errors.path = 'Caminho é obrigatório.';
            }
            return Object.keys(this.errors).length === 0;
        },

        async save() {
            this.globalError = '';
            this.successMsg = '';
            if (!this.validate()) return;
            this.isSubmitting = true;
            try {
                const url = this.isEdit
                    ? `/api/v1/volumes/${this.volumeId}`
                    : '/api/v1/volumes/';
                const method = this.isEdit ? 'PUT' : 'POST';
                const body = {
                    nome: this.form.nome.trim(),
                    path: this.form.path.trim(),
                    descricao: this.form.descricao.trim() || null,
                };
                if (this.isEdit) {
                    body.status = this.form.status;
                }
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (!response.ok) {
                    const err = await response.json();
                    this.globalError = err.error?.message || err.detail || 'Erro ao salvar volume.';
                    return;
                }
                if (this.isEdit) {
                    this.successMsg = 'Volume atualizado com sucesso!';
                } else {
                    window.location.href = '/volumes';
                }
            } catch (e) {
                this.globalError = 'Erro de conexão ao salvar volume.';
            } finally {
                this.isSubmitting = false;
            }
        },
    };
}
</script>
{% endblock %}
