<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Toninho{% endblock %} - Extrator de Processos</title>

    <!-- Tailwind CSS (CDN para desenvolvimento) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <!-- Custom CSS -->
    <style>
        /* HTMX indicator */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator { display: inline; }

        /* Custom components */
        .btn { @apply px-4 py-2 rounded font-medium transition-colors cursor-pointer; }
        .form-input { @apply w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500; }
        .form-label { @apply block text-sm font-medium text-gray-700 mb-1; }
        .form-error { @apply text-sm text-red-600 mt-1; }
        .card { @apply bg-white rounded-lg shadow-md p-6; }
        .badge { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium; }
    </style>

    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50" hx-boost="true">

    <!-- Flash Messages -->
    {% if messages %}
    <div id="flash-messages" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm">
        {% for message in messages %}
        {% include 'components/alert.html' %}
        {% endfor %}
    </div>
    {% endif %}

    <!-- Main Content -->
    {% block body %}{% endblock %}

    <!-- HTMX Config -->
    <script>
        // HTMX event listeners
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            console.log('HTMX swap completed');
        });

        // Error handling
        document.body.addEventListener('htmx:responseError', function(evt) {
            console.error('HTMX error:', evt.detail);
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
