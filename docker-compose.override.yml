# Docker Compose Override para Desenvolvimento
# Este arquivo é automaticamente mergeado com docker-compose.yml

services:
  api:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    command: uvicorn toninho.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/toninho

  worker:
    volumes:
      - docling_cache:/home/toninho/.cache/docling
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG

  beat:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG

volumes:
  docling_cache:
