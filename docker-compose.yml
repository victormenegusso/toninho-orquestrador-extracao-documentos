services:
  redis:
    image: redis:7-alpine
    container_name: toninho-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - toninho_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toninho-api
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - db_data:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - DATABASE_URL=sqlite:///./toninho.db
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - toninho_network
    command: uvicorn toninho.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toninho-worker
    volumes:
      - ./output:/app/output
      - db_data:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - DATABASE_URL=sqlite:///./toninho.db
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - toninho_network
    command: celery -A toninho.workers.celery_app worker --loglevel=info --concurrency=2

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toninho-beat
    volumes:
      - ./output:/app/output
      - db_data:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - DATABASE_URL=sqlite:///./toninho.db
    depends_on:
      - redis
      - worker
    restart: unless-stopped
    networks:
      - toninho_network
    command: celery -A toninho.workers.celery_app beat --loglevel=info

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toninho-flower
    ports:
      - "5555:5555"
    volumes:
      - db_data:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
    depends_on:
      - redis
      - worker
    restart: unless-stopped
    networks:
      - toninho_network
    command: celery -A toninho.workers.celery_app flower --port=5555

volumes:
  redis_data:
    driver: local
  db_data:
    driver: local

networks:
  toninho_network:
    driver: bridge
