repos:
  # ---------------------------------------------------------------------------
  # Verificações gerais de arquivos
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-docstring-first
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---------------------------------------------------------------------------
  # Ruff: linter + formatter (substitui black, isort e flake8)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Mypy: verificação estática de tipos
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: "^toninho/"
        args: ["--ignore-missing-imports", "--no-error-summary"]
        additional_dependencies:
          - pydantic>=2.0
          - sqlalchemy[mypy]>=2.0

  # ---------------------------------------------------------------------------
  # Bandit: análise de segurança do código Python
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        exclude: "^tests/"

  # ---------------------------------------------------------------------------
  # pip-audit: verifica vulnerabilidades nas dependências
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        # Só executa quando poetry.lock ou pyproject.toml mudam
        files: "^(poetry\\.lock|pyproject\\.toml)$"
